# ╔══════════════════════════════════════════════════════════════╗
# ║  EVE-PRIME — KEYBINDINGS                                    ║
# ║  All binds live here and only here                          ║
# ║  Variables $mainMod, $terminal, $browser, $files, $menu,    ║
# ║  $wallpaper defined in hyprland.conf                        ║
# ╚══════════════════════════════════════════════════════════════╝

# ── APPS ────────────────────────────────────────────────────────
bind = $mainMod,       Return,  exec, $terminal
bind = $mainMod,       B,       exec, $browser
bind = $mainMod,       E,       exec, $files
bind = $mainMod,       Space,   exec, $menu
bind = $mainMod,       X,       exec, ~/.config/hypr/scripts/context-menu.sh
bind = $mainMod,       W,       exec, $wallpaper pick
bind = $mainMod,       I,       exec, ~/.config/hypr/scripts/eve-settings.sh
bind = $mainMod, period,        exec, /home/omniking/.local/bin/rofimoji --selector wofi --clipboarder wl-copy --typer wtype

# ── WINDOW ──────────────────────────────────────────────────────
bind = $mainMod,       Q,       killactive
bind = $mainMod SHIFT, Q,       exit
bind = $mainMod,       F,       fullscreen, 1
bind = $mainMod SHIFT, F,       fullscreen, 0
bind = $mainMod,       T,       togglefloating
bind = $mainMod,       C,       centerwindow
bind = $mainMod,       P,       pin
bind = $mainMod SHIFT, V,       togglesplit

# ── SYSTEM ──────────────────────────────────────────────────────
bind = $mainMod,       L,       exec, hyprlock
bind = $mainMod,       R,       exec, hyprctl reload && notify-send "EVE-PRIME" "󰑓 Config reloaded"
bind = $mainMod,       N,       exec, swaync-client -t
bind = $mainMod,       Escape,  exec, wlogout

# ── FOCUS ───────────────────────────────────────────────────────
bind = $mainMod, H,     movefocus, l
bind = $mainMod, J,     movefocus, d
bind = $mainMod, K,     movefocus, u
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# ── MOVE WINDOW ─────────────────────────────────────────────────
bind = $mainMod SHIFT, H,     movewindow, l
bind = $mainMod SHIFT, L,     movewindow, r
bind = $mainMod SHIFT, K,     movewindow, u
bind = $mainMod SHIFT, J,     movewindow, d
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# ── RESIZE ──────────────────────────────────────────────────────
bind = $mainMod CTRL, H,       resizeactive, -40 0
bind = $mainMod CTRL, L,       resizeactive, 40 0
bind = $mainMod CTRL, K,       resizeactive, 0 -40
bind = $mainMod CTRL, J,       resizeactive, 0 40
bind = $mainMod CTRL, left,    resizeactive, -40 0
bind = $mainMod CTRL, right,   resizeactive, 40 0
bind = $mainMod CTRL, up,      resizeactive, 0 -40
bind = $mainMod CTRL, down,    resizeactive, 0 40

# ── MOUSE ───────────────────────────────────────────────────────
bindm = $mainMod, mouse:272,   movewindow
bindm = $mainMod, mouse:273,   resizewindow
bind  = $mainMod, mouse_down,  workspace, e-1
bind  = $mainMod, mouse_up,    workspace, e+1

# ── WORKSPACES ──────────────────────────────────────────────────
# workspace-guard.sh debounces rapid switching (80ms lockfile)
bind = $mainMod, 1, exec, ~/.config/hypr/scripts/workspace-guard.sh 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/workspace-guard.sh 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/workspace-guard.sh 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/workspace-guard.sh 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/workspace-guard.sh 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/workspace-guard.sh 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/workspace-guard.sh 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/workspace-guard.sh 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/workspace-guard.sh 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, TAB,          workspace, e+1
bind = $mainMod SHIFT, TAB,    workspace, e-1

# ── MOVE TO WORKSPACE ───────────────────────────────────────────
bind = $mainMod SHIFT, 1,      movetoworkspace, 1
bind = $mainMod SHIFT, 2,      movetoworkspace, 2
bind = $mainMod SHIFT, 3,      movetoworkspace, 3
bind = $mainMod SHIFT, 4,      movetoworkspace, 4
bind = $mainMod SHIFT, 5,      movetoworkspace, 5

# ── SPECIAL WORKSPACE ───────────────────────────────────────────
bind = $mainMod,       S,      togglespecialworkspace
bind = $mainMod SHIFT, S,      movetoworkspacesilent, special

# ── OVERVIEW ────────────────────────────────────────────────────
bind = $mainMod, Super_L,      hyprexpo:expo, toggle

# ── SCREENSHOT ──────────────────────────────────────────────────
bind = ,               Print,  exec, grim - | swappy -f -
bind = SHIFT,          Print,  exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod,       Print,  exec, grim -g "$(slurp)" - | wl-copy

# ── AUDIO ───────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && ~/.config/hypr/scripts/osd-popup.sh volume
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && ~/.config/hypr/scripts/osd-popup.sh volume
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && ~/.config/hypr/scripts/osd-popup.sh volume
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous

# ── BRIGHTNESS ──────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5% && ~/.config/hypr/scripts/osd-popup.sh brightness
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && ~/.config/hypr/scripts/osd-popup.sh brightness

# ── DESKTOP RIGHT CLICK MENU ───────────────────────────────────
bindn = , mouse:273, exec, ~/.config/hypr/scripts/desktop-menu.sh

# ── SCRATCHPAD TERMINAL ─────────────────────────────────────────
bind = , F12, exec, ~/.config/hypr/scripts/scratchpad.sh

# ── CLIPBOARD MANAGER ────────────────────────────────────────────
bind = $mainMod, V, exec, cliphist list | wofi --dmenu --prompt "󰅍 Clipboard" | cliphist decode | wl-copy

# ── PERFORMANCE DEBUGGER ─────────────────────────────────────────
bind = $mainMod, D, exec, ~/.config/hypr/scripts/perf-overlay.sh

# ── GESTURE ─────────────────────────────────────────────────────
hyprexpo-gesture = 3, up, expo
