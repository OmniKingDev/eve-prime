# ╔══════════════════════════════════════════════════════════════╗
# ║  EVE-PRIME — Hyprlock Skin                                   ║
# ║  Cyan clock · Violet date · OmniKing identity               ║
# ║  Background: blurred screenshot of active desktop           ║
# ╚══════════════════════════════════════════════════════════════╝

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 3
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# ── CLOCK ─────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(00D4FFff)
    font_size = 72
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 120
    halign = center
    valign = center
}

# ── DATE ──────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color = rgba(B080D0cc)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 50
    halign = center
    valign = center
}

# ── IDENTITY ──────────────────────────────────────────────────
label {
    monitor =
    text = 󱄑  OmniKing Dev
    color = rgba(7B2FBEcc)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -60
    halign = center
    valign = center
}

# ── PASSWORD FIELD ────────────────────────────────────────────
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(7B2FBEcc)
    inner_color = rgba(0D001599)
    font_color = rgba(E8E8F0ff)
    fade_on_empty = true
    placeholder_text = 󰍁  enter password
    rounding = 8
    check_color = rgba(00D4FFff)
    fail_color = rgba(FF4444ff)
    fail_text = 󰀨  invalid password
    capslock_color = rgba(FFB347ff)
    position = 0, -140
    halign = center
    valign = center
}

# ── POWER BUTTONS ─────────────────────────────────────────────

# Suspend (violet)
label {
    monitor =
    text = 󰒲
    color = rgba(7B2FBEcc)
    font_size = 24
    font_family = Symbols Nerd Font
    position = 120, -220
    halign = center
    valign = center
    onclick = systemctl suspend
}

# Reboot (warning amber)
label {
    monitor =
    text = 󰑓
    color = rgba(FFB347cc)
    font_size = 24
    font_family = Symbols Nerd Font
    position = 0, -220
    halign = center
    valign = center
    onclick = systemctl reboot
}

# Shutdown (red)
label {
    monitor =
    text = 󰐥
    color = rgba(FF4444cc)
    font_size = 24
    font_family = Symbols Nerd Font
    position = -120, -220
    halign = center
    valign = center
    onclick = systemctl poweroff
}
