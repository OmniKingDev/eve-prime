# ╔══════════════════════════════════════════════════════════════╗
# ║         EVE-PRIME — MONITORS                                 ║
# ║         DP-1   primary  1920x1080@100Hz                      ║
# ║         HDMI-A-1 above  3840x2160@60Hz                       ║
# ║         wildcard fallback for unknown displays               ║
# ╚══════════════════════════════════════════════════════════════╝

# ── PRIMARY — Sceptre F24 (DP-1) ──────────────────────────────
monitor = DP-1, 1920x1080@100, 0x0, 1

# ── SECONDARY — TCL 4K TV (HDMI-A-1) above primary ────────────
# Placed at y=-2160 (above DP-1). x=0 aligns left edges; adjust x=-960
# to centre the 4K panel horizontally over the 1080p one if preferred.
monitor = HDMI-A-1, 3840x2160@60, 0x-2160, 1.25

# ── FALLBACK — any unrecognised display (eDP-1, USB-C docks…) ─
monitor = , preferred, auto, auto
