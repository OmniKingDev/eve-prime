# ╔══════════════════════════════════════════════════════════════╗
# ║  EVE-PRIME — Hyprland Plugins                                ║
# ║  Loaded via plugin= so dispatchers/rule-types are available  ║
# ║  at config parse time (before keybinds.conf/windowrules.conf)║
# ╚══════════════════════════════════════════════════════════════╝

# Load plugins at parse time so their dispatchers and rule types
# are registered before keybinds.conf and windowrules.conf source.
plugin = /var/cache/hyprpm/omniking/hyprland-plugins/hyprbars.so
plugin = /var/cache/hyprpm/omniking/hyprland-plugins/hyprexpo.so
plugin = /var/cache/hyprpm/omniking/hyprland-plugins/hyprfocus.so
plugin = /var/cache/hyprpm/omniking/hyprland-plugins/borders-plus-plus.so
plugin = /var/cache/hyprpm/omniking/hyprland-plugins/hyprwinwrap.so
plugin = /var/cache/hyprpm/omniking/hyprland-plugins/csgo-vulkan-fix.so
plugin = /var/cache/hyprpm/omniking/hyprland-plugins/xtra-dispatchers.so

plugin {
    hyprbars {
        bar_height = 28
        bar_color = rgba(0D001599)
        bar_text_size = 12
        bar_text_font = JetBrainsMono Nerd Font
        bar_text_color = rgba(E8E8F0ff)
        bar_button_padding = 8
        bar_padding = 10
        bar_precedence_over_border = true
        bar_text_align = center
        bar_buttons_alignment = right
        bar_blur = true
        col.text = rgba(E8E8F0ff)
        on_double_click = hyprctl dispatch fullscreen 1
        hyprbars-button = rgba(FF4444ff), 14, ✦, hyprctl dispatch closewindow active
        hyprbars-button = rgba(7B2FBEff), 14, ❋, hyprctl dispatch fullscreen 0
        hyprbars-button = rgba(FFB347ff), 14, ·, hyprctl dispatch movetoworkspacesilent special:minimize
    }
    borders-plus-plus {
        add_borders = 1
        col.border_1 = rgba(88c0d088)
        border_size_1 = 1
    }
    hyprfocus {
        enabled = yes
        animate_floating = yes
        animate_workspacechange = yes
        focus_animation = shrink
        bezier = bezIn, 0.5, 0.0, 1.0, 0.5
        bezier = bezOut, 0.0, 0.5, 0.5, 1.0
        shrink {
            shrink_percentage = 0.97
            in_bezier = bezIn
            in_speed = 1
            out_bezier = bezOut
            out_speed = 2
        }
    }
    hyprexpo {
        columns = 3
        gap_size = 8
        bg_col = rgb(0D0015)
        workspace_method = first 1
        gesture_distance = 300
    }
    hyprtrails {
        color = rgba(88c0d044)
    }
    hyprwinwrap {
        class = hyprwinwrap
    }
    hyprscrolling {
        enabled = 1
    }
    csgo-vulkan-fix {
        res_w = 1280
        res_h = 720
    }
    xtra-dispatchers {
        enabled = true
    }
}
