# ╔══════════════════════════════════════════════════════════════╗
# ║         EVE-PRIME — GENERAL                                  ║
# ║         Gaps, borders, layout engine                         ║
# ╚══════════════════════════════════════════════════════════════╝

general {
    gaps_in             = 4
    gaps_out            = 10, 10, 10, 10
    border_size         = 2
    col.active_border   = rgba(88c0d0ff) rgba(b48eadff) 45deg
    col.inactive_border = rgba(2e3440aa)
    layout              = floating
    resize_on_border    = true
    hover_icon_on_border = true
    no_focus_fallback   = false
    allow_tearing       = false

    snap {
        enabled     = true
        window_gap  = 10
        monitor_gap = 10
    }
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = true
    smart_resizing = true
    force_split = 2
}

master {
    new_status = master
    new_on_top = true
    mfact      = 0.55
}

misc {
    disable_hyprland_logo        = true
    disable_splash_rendering     = true
    mouse_move_enables_dpms      = true
    key_press_enables_dpms       = true
    animate_manual_resizes       = false
    animate_mouse_windowdragging = true
    enable_swallow               = true
    swallow_regex                = ^(kitty|gnome-terminal)$
    focus_on_activate            = false
    vfr                          = true
    vrr                          = 0
    middle_click_paste           = true
    always_follow_on_dnd         = true
    allow_session_lock_restore   = true
}

render {
    direct_scanout = true
}
